services:
  # 后端：FastAPI + LangGraph + FastMCP
  finagent-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend  # 支持热重载
    environment:
      - ENV=development
      - ALLOWED_ORIGINS=http://localhost:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # 资源限制：防止 Agent 逻辑导致内存溢出
    deploy:
      resources:
        limits:
          memory: 2G
    # 健康检查：确保 FastAPI 真正起来了再让前端连接
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - finagent-network

  # 前端：Nginx 托管 React/Vite 静态资源
  finagent-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finagent-frontend
    ports:
      - "3000:80"  # 宿主机 3000 映射到 Nginx 的 80
    volumes:
      - ./frontend/src:/app/src # 可选：同步源码
    # 核心修复：等后端 Healthcheck 通过后再启动
    depends_on:
      finagent-backend:
        condition: service_healthy
    networks:
      - finagent-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    restart: always

networks:
  finagent-network:
    driver: bridge