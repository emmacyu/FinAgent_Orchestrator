services:
  # backend：FastAPI + LangGraph + FastMCP
  finagent-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend  # support hot reload
    environment:
      - ENV=development
      - ALLOWED_ORIGINS=http://localhost:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # resources: prevent the memory overflow
    deploy:
      resources:
        limits:
          memory: 2G
    # health check to ensure FastAPI is up before frontend connects
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - finagent-network

  # frontend: Nginx take care of serving React/Vite static assets
  finagent-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finagent-frontend
    ports:
      - "3000:80"  # host 3000 maps to Nginx 80
    volumes:
      - ./frontend/src:/app/src # optional: sync source code
    # core fix: wait for backend healthcheck to pass before starting
    depends_on:
      finagent-backend:
        condition: service_healthy
    networks:
      - finagent-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    restart: always

networks:
  finagent-network:
    driver: bridge